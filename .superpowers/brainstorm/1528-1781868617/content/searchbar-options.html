<h2>搜索栏的"选项"包含哪些？</h2>
<p class="subtitle">可多选，选出你想在搜索栏上方/旁边直接放的控件</p>

<div class="options" data-multiselect>

  <div class="option" data-choice="type" onclick="toggleSelect(this)">
    <div class="letter">1</div>
    <div class="content">
      <h3>搜索类型切换</h3>
      <p>按钮组或下拉，切换「关键词搜索」vs「BV号直接获取」两种模式</p>
    </div>
  </div>

  <div class="option" data-choice="quality" onclick="toggleSelect(this)">
    <div class="letter">2</div>
    <div class="content">
      <h3>默认音质预设</h3>
      <p>下拉选择默认下载音质（如 192kbps / 320kbps / Hi-Res），让每次下载不用重复设置</p>
    </div>
  </div>

  <div class="option" data-choice="format" onclick="toggleSelect(this)">
    <div class="letter">3</div>
    <div class="content">
      <h3>输出格式选择</h3>
      <p>MP3 / FLAC / AAC 等，直接在搜索区域旁放置</p>
    </div>
  </div>

  <div class="option" data-choice="page" onclick="toggleSelect(this)">
    <div class="letter">4</div>
    <div class="content">
      <h3>搜索结果数量 / 分页控制</h3>
      <p>每页显示多少条、翻页按钮等</p>
    </div>
  </div>

</div>
